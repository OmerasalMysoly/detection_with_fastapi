<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intern Assignment API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent: #ee900c;
      --accent-glow: rgba(238, 144, 12, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Background Background */
    .ambient-light {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: -1;
      background:
        radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
      animation: ambientPulse 10s ease-in-out infinite alternate;
    }

    @keyframes ambientPulse {
      0% {
        opacity: 0.5;
      }

      100% {
        opacity: 1;
      }
    }

    .container {
      text-align: center;
      padding: 4rem;
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      max-width: 600px;
      width: 90%;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-bottom: 3rem;
      font-weight: 300;
    }

    .version-container {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .version-label {
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .version-number {
      font-size: 5rem;
      font-weight: 300;
      line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 40px var(--accent-glow);
      position: relative;
    }

    .version-number::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 120%;
      height: 120%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      z-index: -1;
      opacity: 0.5;
    }

    .divider {
      height: 1px;
      width: 60px;
      background: linear-gradient(90deg, transparent, var(--text-secondary), transparent);
      margin: 2rem auto;
      opacity: 0.3;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 9999px;
      font-size: 0.85rem;
      color: #34d399;
      margin-top: 1rem;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #34d399;
      border-radius: 50%;
      box-shadow: 0 0 8px #34d399;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4);
      }

      70% {
        box-shadow: 0 0 0 6px rgba(52, 211, 153, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(52, 211, 153, 0);
      }
    }

    /* Floating particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      pointer-events: none;
      z-index: -1;
      animation: float 20s infinite linear;
    }

    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-100vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="ambient-light"></div>

  <!-- Particles -->
  <script>
    for (let i = 0; i < 15; i++) {
      let p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.top = (Math.random() * 20 + 100) + 'vh'; // start below screen
      p.style.width = p.style.height = (Math.random() * 30 + 10) + 'px';
      p.style.animationDuration = (Math.random() * 20 + 10) + 's';
      p.style.animationDelay = (Math.random() * 5) + 's';
      document.body.appendChild(p);
    }
  </script>

  <div class="container">
    <h1>Assignment API</h1>
    <p class="subtitle">Intern Development Environment (Vision)</p>

    <div class="divider"></div>

    <div class="version-container">
      <span class="version-label">Current Build</span>
      <div class="version-number">{{ version }}</div>
    </div>

    <br>
    <div class="status-badge">
      <div class="status-dot"></div>
      System Operational
    </div>
  </div>

</body>

</html>
